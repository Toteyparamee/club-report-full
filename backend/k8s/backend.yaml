apiVersion: apps/v1
kind: Deployment
metadata:
  name: clubreport-backend
  namespace: cnpapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clubreport-backend
  template:
    metadata:
      labels:
        app: clubreport-backend
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: backend
          image: registry.kpinnovative.co.th/paramee/club-report/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: clubreport-config
            - secretRef:
                name: clubreport-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: clubreport-backend-svc
  namespace: cnpapp
spec:
  selector:
    app: clubreport-backend
  ports:
    - port: 4000
      targetPort: 4000
